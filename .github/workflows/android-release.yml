name: Android Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version (e.g. 1.2.2)
        required: true
        default: "1.2.2"
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK components
        run: |
          sdkmanager --install "platforms;android-35" "build-tools;35.0.0"

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build release APK
        working-directory: android/mc-monitor-android
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Package APK
        run: |
          VER="${{ steps.ver.outputs.name }}"
          mkdir -p dist
          cp android/mc-monitor-android/app/build/outputs/apk/release/app-release.apk "dist/mc-monitor-v${VER}.apk"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mc-monitor-apk
          path: dist/*.apk

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VER="${{ steps.ver.outputs.name }}"
          TAG="v${VER}"
          APK="dist/mc-monitor-v${VER}.apk"
          NOTES="MC Monitor Android v${VER} — built by GitHub Actions."
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$APK" --clobber
          else
            gh release create "$TAG" "$APK" \
              --title "MC Monitor Android v${VER}" \
              --notes "$NOTES"
          fi
